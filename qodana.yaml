#-------------------------------------------------------------------------------#
#               Qodana analysis is configured by qodana.yaml file               #
#             https://www.jetbrains.com/help/qodana/qodana-yaml.html            #
#-------------------------------------------------------------------------------#

#################################################################################
#              WARNING: Do not store sensitive information in this file,        #
#               as its contents will be included in the Qodana report.          #
#################################################################################
version: "1.0"

# Perfil "recommended" cobre mais inspeções que o "starter":
# segurança, performance, boas práticas Java e Spring
profile:
  name: qodana.recommended

# Desabilitar inspeções específicas se necessário
#exclude:
#  - name: <SomeDisabledInspectionId>
#    paths:
#      - <path/where/not/run/inspection>

# Excluir pastas que não devem ser analisadas
exclude:
  - name: All
    paths:
      - target          # bytecode e artefatos gerados pelo Maven
      - .mvn            # wrapper do Maven

projectJDK: "21"

# Compila o projeto antes da análise para que o Qodana resolva
# corretamente todas as dependências e evite falsos positivos
bootstrap: ./mvnw clean package -DskipTests --no-transfer-progress

# Quality gate — falha o CI se qualquer condição for violada
failureConditions:
  severityThresholds:
    any: 20       # máximo de 20 problemas no total (qualquer severidade)
    high: 5       # máximo de 5 problemas de alta severidade
    critical: 0   # zero tolerância para problemas críticos

linter: jetbrains/qodana-jvm-community:2026.1
