server:
  port: 8080

spring:
  data:
    mongodb:
      uri: mongodb://root:pass@localhost:27017/techflixdb?authSource=admin

  mvc:
    format:
      date: iso
      date-time: iso-offset

  servlet:
    multipart:
      enabled: true
      location: ${java.io.tmpdir}
      file-size-threshold: 2KB
      max-file-size: 10MB
      max-request-size: 10MB

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /api-docs.html
