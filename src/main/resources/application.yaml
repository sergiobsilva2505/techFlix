server:
  port: 8080

spring:
  data:
    mongodb:
      authentication-database: admin
      auto-index-creation: true
      database: techflixdb
      username: root
      password: pass

  mvc:
    format:
      date: iso
      date-time: iso-offset

  servlet:
    multipart:
      enabled: true
      location: ${java.io.tmpdir}
      file-size-threshold: 2KB
      max-file-size: 200MB
      max-request-size: 215MB

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /api-docs.html
